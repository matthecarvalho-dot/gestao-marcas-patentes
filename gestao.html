function detectarEstadoPorDDD(telefoneInput, estadoSelect) {
    const tel = telefoneInput.value.replace(/\D/g, '');
    if (tel.length >= 2) {
        const ddd = tel.substring(0, 2);
        if (dddEstados[ddd]) {
            estadoSelect.value = dddEstados[ddd];
            estadoSelect.classList.add('estado-detectado');
            telefoneInput.classList.add('estado-detectado');
            return { encontrado: true, estado: dddEstados[ddd], ddd: ddd };
        }
    }
    return { encontrado: false };
}

function formatarTelefone(input) {
    let t = input.value.replace(/\D/g, '');
    if (t.length > 0) {
        if (t.length <= 2) input.value = '(' + t;
        else if (t.length <= 7) input.value = '(' + t.substring(0, 2) + ') ' + t.substring(2);
        else input.value = '(' + t.substring(0, 2) + ') ' + t.substring(2, 7) + '-' + t.substring(7, 11);
    }
}

auth.onAuthStateChanged(async(user)=>{if(!user){window.location.href='index.html';return}currentUser=user;const userDoc=await db.collection('gestao_usuarios').doc(user.uid).get();userData=userDoc.exists?userDoc.data():{nome:user.email,role:'user'};await db.collection('gestao_usuarios').doc(user.uid).update({ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});document.getElementById('userNameDisplay').textContent=userData.nome||user.email.split('@')[0];document.getElementById('userAvatar').textContent=(userData.nome||user.email)[0].toUpperCase();document.getElementById('userRoleDisplay').textContent=userData.role==='admin'?'Administrador':'Usuário';if(userData.role==='admin')document.getElementById('navUsuarios').style.display='flex';await carregarVendedores();setupListeners();updateDate();navigateTo('dashboard');});

"total-box gold"><h5><i class="fas fa-clock"></i> Pendentes</h5><div class="big">R$ ${pendentes.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}</div><div class="total-sub">${pendentes.length} clientes</div></div><div class="total-box" style="border-color:rgba(124,58,237,0.3)"><h5 style="color:#a78bfa"><i class="fas fa-trophy"></i> Melhor Vendedor</h5><div class="big" style="color:#a78bfa">${melhor.nome}</div><div class="total-sub">R$ ${melhor.valor.toFixed(2)}</div></div></div><div class="panel"><div class="panel-header"><h4><i class="fas fa-clock-rotate-left"></i> Últimos Registros</h4><button class="btn btn-gold btn-sm" onclick="openModal()"><i class="fas fa-plus"></i> Novo Cliente</button></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Cliente</th><th>Marca</th><th>Vendedor</th><th>Estado</th><th>Valor</th><th>Status</th></tr></thead><tbody>${[...clientes].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,8).map(c=>`<tr><td>${fmtDate(c.data)}</td><td><strong>${c.nome}</strong></td><td>${c.marca}</td><td>${c.vendedora}</td><td>${c.estado}</td><td><strong>R$ ${(parseFloat(c.valorTotal)||0).toFixed(2)}</strong></td><td>${badge(c.status)}</td></tr>`).join('')||'<tr><td colspan="7" style="text-align:center;padding:40px">Nenhum cliente</td></tr>'}</tbody></table></div></div>`}
function renderClientes(){const fechados=clientes.filter(c=>c.status==='closed'),pendentes=clientes.filter(c=>c.status==='pending');return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px"><h2 style="font-size:20px;font-weight:700">Base de Clientes</h2><button class="btn btn-gold" onclick="openModal()"><i class="fas fa-plus"></i> Novo Cliente</button></div><div class="totals-row"><div class="total-box green"><h5>Fechados</h5><div class="big">R$ ${fechados.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}</div><div class="total-sub">${fechados.length} clientes</div></div><div class="total-box gold"><h5>Pendentes</h5><div class="big">R$ ${pendentes.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}</div><div class="total-sub">${pendentes.length} clientes</div></div><div class="total-box red"><h5>Saldo a Receber</h5><div class="big">R$ ${clientes.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0)-(parseFloat(c.valorEntrada)||0),0).toFixed(2)}</div><div class="total-sub">Total pendente</div></div></div><div class="filter-bar"><div class="filter-group"><label>Vendedor</label><select class="filter-input" id="filtroVendedora"><option value="">Todos</option>${vendedoresList.map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div><div class="filter-group"><label>Status</label><select class="filter-input" id="filtroStatus"><option value="">Todos</option><option value="closed">Fechados</option><option value="pending">Pendentes</option></select></div><div class="filter-group"><label>Buscar</label><input type="text" class="filter-input" id="filtroBusca" placeholder="Nome ou marca..." style="min-width:160px"></div><button class="btn btn-outline btn-sm" onclick="clearFiltros()"><i class="fas fa-times"></i> Limpar</button></div><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Cliente</th><th>Email</th><th>CPF/CNPJ</th><th>Telefone</th><th>Marca</th><th>Vendedor</th><th>Estado</th><th>Valor</th><th>Entrada</th><th>Saldo</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tabelaClientes"></tbody></table></div><div style="padding:12px 20px;color:var(--text3);font-size:10px" id="registrosInfo">0 registros</div></div>`}
function setupFiltros(){['filtroVendedora','filtroStatus','filtroBusca'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener(id==='filtroBusca'?'input':'change',aplicarFiltros)});aplicarFiltros()}
function aplicarFiltros(){const v=document.getElementById('filtroVendedora')?.value||'',s=document.getElementById('filtroStatus')?.value||'',b=document.getElementById('filtroBusca')?.value?.toLowerCase()||'';let f=[...clientes];if(v)f=f.filter(c=>c.vendedora===v);if(s)f=f.filter(c=>c.status===s);if(b)f=f.filter(c=>c.nome.toLowerCase().includes(b)||c.marca.toLowerCase().includes(b));f.sort((a,b)=>new Date(b.data)-new Date(a.data));const tbody=document.getElementById('tabelaClientes');if(tbody)tbody.innerHTML=f.map(c=>{const vt=parseFloat(c.valorTotal)||0,ve=parseFloat(c.valorEntrada)||0,sd=vt-ve;return`<tr><td>${fmtDate(c.data)}</td><td><strong>${c.nome}</strong></td><td>${c.email||'-'}</td><td>${c.cnpj||c.cpf||'-'}</td><td>${c.telefone||'-'}</td><td><strong>${c.marca}</strong></td><td>${c.vendedora}</td><td>${c.estado}</td><td>R$ ${vt.toFixed(2)}</td><td>R$ ${ve.toFixed(2)}</td><td style="color:${sd<=0?'var(--verde)':'var(--laranja)'};font-weight:600">R$ ${sd.toFixed(2)}</td><td>${badge(c.status)}</td><td style="display:flex;gap:4px"><button class="btn btn-outline btn-icon" onclick="openModal('${c.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-outline danger btn-icon" onclick="deleteCliente('${c.id}')"><i class="fas fa-trash"></i></button></td></tr>`}).join('')||'<tr><td colspan="13" style="text-align:center;padding:40px">Nenhum cliente</td></tr>';const info=document.getElementById('registrosInfo');if(info)info.textContent=`${f.length} registro(s)`}

function renderMensal(){const meses={};clientes.forEach(c=>{if(!c.data)return;const k=c.data.substring(0,7);if(!meses[k])meses[k]=[];meses[k].push(c)});const ord=Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0]));if(ord.length===0)return'<div style="text-align:center;padding:60px"><div style="font-size:48px">📁</div><h3>Nenhum mês</h3></div>';return`<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">📅 Relatório Mensal</h2><div class="folder-grid">${ord.map(([mes,it])=>{const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const fech=it.filter(c=>c.status==='closed'),pend=it.filter(c=>c.status==='pending'),val=it.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0);return`<div class="folder-card" style="position:relative"><div onclick="openMesDetalhe('${mes}')"><div class="folder-icon">📁</div><h4>${nome} ${ano}</h4><div style="font-size:10px;color:var(--text3)">${it.length} clientes</div><div style="font-size:16px;font-weight:800;color:var(--verde)">R$ ${val.toFixed(2)}</div><div style="font-size:9px"><span style="color:var(--verde)">${fech.length} fechados</span> · <span style="color:var(--gold)">${pend.length} pendentes</span></div></div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-outline btn-sm" style="flex:1" onclick="imprimirRelatorio('${mes}')"><i class="fas fa-print"></i> Imprimir</button><button class="btn btn-outline danger btn-sm" style="flex:1" onclick="excluirMes('${mes}')"><i class="fas fa-trash"></i> Excluir</button></div></div>`}).join('')}</div>`}
window.excluirMes=async function(mes){const items=clientes.filter(c=>c.data&&c.data.startsWith(mes));const[ano,mn]=mes.split('-');const nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];if(items.length===0){showToast('Nenhum cliente neste mês!','error');return}if(!confirm(`⚠️ ATENÇÃO!\n\nExcluir TODOS os ${items.length} clientes de ${nome} ${ano}?\n\nValor total: R$ ${items.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}\n\nEsta ação NÃO pode ser desfeita!`))return;if(!confirm(`Tem certeza ABSOLUTA?\n\nDigite "EXCLUIR" no próximo campo para confirmar.`))return;const confirmacao=prompt(`Digite "EXCLUIR" para apagar ${nome} ${ano}:`);if(confirmacao!=='EXCLUIR'){showToast('Exclusão cancelada!','error');return}let excluidos=0;let batch=db.batch();for(const c of items){batch.delete(db.collection('gestao_clientes').doc(c.id));excluidos++;if(excluidos%400===0){await batch.commit();batch=db.batch()}}if(excluidos%400!==0){await batch.commit()}showToast(`${excluidos} clientes excluídos de ${nome} ${ano}!`,'success')}
window.openMesDetalhe=function(mes){const items=clientes.filter(c=>c.data&&c.data.startsWith(mes));const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const fech=items.filter(c=>c.status==='closed'),pend=items.filter(c=>c.status==='pending');const overlay=document.createElement('div');overlay.className='modal-overlay show';overlay.innerHTML=`<div class="modal wide" onclick="event.stopPropagation()"><div class="modal-header"><h3>📁 ${nome} ${ano}</h3><button class="btn-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div><div style="padding:20px"><div class="totals-row"><div class="total-box green"><h5>Fechados</h5><div class="big">R$ ${fech.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}</div><div class="total-sub">${fech.length} clientes</div></div><div class="total-box gold"><h5>Pendentes</h5><div class="big">R$ ${pend.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)}</div><div class="total-sub">${pend.length} clientes</div></div><div class="total-box red"><h5>Saldo</h5><div class="big">R$ ${items.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0)-(parseFloat(c.valorEntrada)||0),0).toFixed(2)}</div><div class="total-sub">a receber</div></div></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Marca</th><th>Valor</th><th>Entrada</th><th>Status</th></tr></thead><tbody>${items.map(c=>`<tr><td>${fmtDate(c.data)}</td><td>${c.nome}</td><td>${c.vendedora}</td><td>${c.marca}</td><td>R$ ${(parseFloat(c.valorTotal)||0).toFixed(2)}</td><td>R$ ${(parseFloat(c.valorEntrada)||0).toFixed(2)}</td><td>${badge(c.status)}</td></tr>`).join('')}</tbody></table></div></div></div>`;overlay.addEventListener('click',function(e){if(e.target===this)this.remove()});document.body.appendChild(overlay)}
window.imprimirRelatorio=function(mes){const items=clientes.filter(c=>c.data&&c.data.startsWith(mes));const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const fech=items.filter(c=>c.status==='closed'),pend=items.filter(c=>c.status==='pending');const vt=items.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0),ve=items.reduce((s,c)=>s+(parseFloat(c.valorEntrada)||0),0);const janela=window.open('','_blank','width=900,height=700');janela.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório ${nome} ${ano} - Kronos System</title><style>*{margin:0;padding:0}body{font-family:Arial,sans-serif;padding:30px;color:#1a1a2e}.header{text-align:center;border-bottom:3px solid #e5b84c;padding-bottom:16px;margin-bottom:24px}.header h1{font-size:24px}.header span{color:#e5b84c}.header p{font-size:12px;color:#666}.resumo{display:flex;justify-content:space-around;background:#f8f9fa;border-radius:10px;padding:18px;margin-bottom:24px}.resumo-item{text-align:center}.resumo-item .v{font-size:22px;font-weight:800}.resumo-item .l{font-size:10px;color:#666}table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#e5b84c;color:#000;padding:10px;text-align:left;font-size:10px}td{padding:8px;border-bottom:1px solid #ddd;font-size:11px}tr:nth-child(even){background:#f8f9fa}.footer{text-align:center;margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#999}@media print{body{padding:15px}}</style></head><body><div class="header"><h1>Kronos<span>System</span></h1><p>Relatório Mensal - ${nome} ${ano} | Emitido em ${new Date().toLocaleDateString('pt-BR')}</p></div><div class="resumo"><div class="resumo-item"><div class="v">${items.length}</div><div class="l">Total</div></div><div class="resumo-item"><div class="v" style="color:#059669">R$ ${vt.toFixed(2)}</div><div class="l">Valor Total</div></div><div class="resumo-item"><div class="v">${fech.length}</div><div class="l">Fechados (R$ ${fech.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)})</div></div><div class="resumo-item"><div class="v">${pend.length}</div><div class="l">Pendentes (R$ ${pend.reduce((s,c)=>s+(parseFloat(c.valorTotal)||0),0).toFixed(2)})</div></div><div class="resumo-item"><div class="v" style="color:#dc2626">R$ ${(vt-ve).toFixed(2)}</div><div class="l">Saldo a Receber</div></div></div><table><thead><tr><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Marca</th><th>Estado</th><th>Valor</th><th>Entrada</th><th>Status</th></tr></thead><tbody>${items.map(c=>`<tr><td>${fmtDate(c.data)}</td><td>${c.nome}</td><td>${c.vendedora}</td><td>${c.marca}</td><td>${c.estado}</td><td>R$ ${(parseFloat(c.valorTotal)||0).toFixed(2)}</td><td>R$ ${(parseFloat(c.valorEntrada)||0).toFixed(2)}</td><td>${c.status==='closed'?'✅ Fechado':'⏳ Pendente'}</td></tr>`).join('')}</tbody></table><div class="footer"><p>Kronos System • Controle de Marcas</p></div><script>window.onload=function(){window.print()}<\/script></body></html>`);janela.document.close()}
function renderVendedores(){const stats={};vendedoresList.forEach(v=>{stats[v]={t:0,f:0,p:0,vf:0,vp:0}});clientes.forEach(c=>{if(!stats[c.vendedora])stats[c.vendedora]={t:0,f:0,p:0,vf:0,vp:0};stats[c.vendedora].t++;if(c.status==='closed'){stats[c.vendedora].f++;stats[c.vendedora].vf+=parseFloat(c.valorTotal)||0}else{stats[c.vendedora].p++;stats[c.vendedora].vp+=parseFloat(c.valorTotal)||0}});return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px">Desempenho dos Vendedores</h2><button class="btn btn-gold" onclick="novoVendedor()"><i class="fas fa-plus"></i> Novo</button></div><div class="vendedor-grid">${vendedoresList.map((n,i)=>{const s=stats[n]||{t:0,f:0,p:0,vf:0,vp:0};return`<div class="v-card"><div class="v-header"><div class="v-avatar" style="background:${avatarCores[i%8]}">${n.charAt(0)}</div><div><div class="v-name" onclick="editarVendedor('${n}')">${n} <i class="fas fa-pen" style="font-size:8px"></i></div><div style="font-size:10px;color:var(--text3)">${s.t} clientes</div></div></div><div class="v-stats"><div class="stat-mini green"><div class="sn">${s.f}</div><div class="sl">Fechados</div><div class="sv">R$ ${s.vf.toFixed(2)}</div></div><div class="stat-mini gold"><div class="sn">${s.p}</div><div class="sl">Pendentes</div><div class="sv">R$ ${s.vp.toFixed(2)}</div></div><div class="stat-mini red"><div class="sn">${s.t}</div><div class="sl">Total</div><div class="sv">R$ ${(s.vf+s.vp).toFixed(2)}</div></div></div><div class="v-total"><div class="tn">R$ ${(s.vf+s.vp).toFixed(2)}</div></div></div>`}).join('')||'<div style="grid-column:1/-1;text-align:center;padding:40px">Nenhum vendedor</div>'}</div>`}
window.editarVendedor=function(nome){const n=prompt('Novo nome:',nome);if(!n||n.trim().toUpperCase()===nome)return;atualizarVendedor(nome,n.trim().toUpperCase())}
window.novoVendedor=function(){const n=prompt('Nome:');if(!n)return;const nu=n.trim().toUpperCase();if(vendedoresList.includes(nu)){alert('Já existe!');return}vendedoresList.push(nu);db.collection('gestao_config').doc('vendedores').set({lista:vendedoresList});renderCurrentPage()}
async function atualizarVendedor(oldName,newName){if(vendedoresList.includes(newName)&&oldName!==newName){alert('Já existe!');return}const i=vendedoresList.indexOf(oldName);if(i>=0)vendedoresList[i]=newName;await db.collection('gestao_config').doc('vendedores').set({lista:vendedoresList});const s=await db.collection('gestao_clientes').where('vendedora','==',oldName).get();const b=db.batch();s.forEach(d=>b.update(d.ref,{vendedora:newName}));await b.commit();renderCurrentPage()}
function renderEstados(){const ec={};clientes.forEach(c=>{if(c.estado)ec[c.estado]=(ec[c.estado]||0)+1});const max=Math.max(...Object.values(ec),1);return`<h2 style="font-size:20px;margin-bottom:20px">🗺️ Análise por Estados</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div class="panel"><div class="panel-header"><h4>Gráfico Pizza</h4></div><div style="padding:20px;text-align:center"><canvas id="pieChart" width="200" height="200"></canvas><div id="pieLegend" style="margin-top:12px;text-align:left"></div></div></div><div class="panel"><div class="panel-header"><h4>Concentração</h4></div><div style="padding:20px"><div class="states-grid">${Object.entries(ec).sort(([,a],[,b])=>b-a).map(([uf,c])=>{const cls=c>max*0.6?'high':c>max*0.3?'medium':'low';return`<div class="state-item ${cls}"><div>${uf}</div><small>${c}</small></div>`}).join('')}</div></div></div></div>`;setTimeout(()=>{const cv=document.getElementById('pieChart');if(!cv)return;const ctx=cv.getContext('2d');const srt=Object.entries(ec).sort(([,a],[,b])=>b-a);const tot=srt.reduce((s,[,c])=>s+c,0);ctx.clearRect(0,0,200,200);let ang=-Math.PI/2;srt.forEach(([,c],i)=>{const sa=(c/tot)*2*Math.PI;ctx.beginPath();ctx.moveTo(100,100);ctx.arc(100,100,90,ang,ang+sa);ctx.closePath();ctx.fillStyle=coresEstados[i%coresEstados.length];ctx.fill();ang+=sa});ctx.beginPath();ctx.arc(100,100,40,0,2*Math.PI);ctx.fillStyle='#111827';ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 14px Inter';ctx.textAlign='center';ctx.fillText(tot,100,104);const lg=document.getElementById('pieLegend');if(lg)lg.innerHTML=srt.slice(0,10).map(([uf,c],i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:10px"><div style="width:10px;height:10px;border-radius:3px;background:${coresEstados[i%coresEstados.length]}"></div>${uf}: ${c} (${Math.round((c/tot)*100)}%)</div>`).join('')},100)}
function renderUsuarios(){if(userData.role!=='admin')return'<div style="text-align:center;padding:60px"><h3>🔒 Acesso restrito</h3></div>';return`<h2 style="font-size:20px;margin-bottom:20px">👥 Gerenciar Usuários</h2><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Nome</th><th>Email</th><th>Whatsapp</th><th>Status</th><th>Cadastro</th><th>Último Acesso</th><th>Ações</th></tr></thead><tbody id="tabelaUsuarios"></tbody></table></div></div>`}
async function setupUsuarios(){if(userData.role!=='admin')return;const s=await db.collection('gestao_usuarios').orderBy('criadoEm','desc').get();const t=document.getElementById('tabelaUsuarios');t.innerHTML=s.docs.map(d=>{const u=d.data();return`<tr><td><strong>${u.nome||'-'}</strong></td><td>${u.email}</td><td>${u.whatsapp||'-'}</td><td><span class="badge ${u.ativo!==false?'success':'danger'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td><td>${u.criadoEm?new Date(u.criadoEm.toDate()).toLocaleDateString('pt-BR'):'-'}</td><td>${u.ultimoAcesso?new Date(u.ultimoAcesso.toDate()).toLocaleString('pt-BR'):'-'}</td><td><button class="btn btn-outline btn-sm" onclick="toggleUsuario('${d.id}',${u.ativo!==false})">${u.ativo!==false?'🔒 Bloquear':'🔓 Ativar'}</button></td></tr>`}).join('')||'<tr><td colspan="7" style="text-align:center;padding:40px">Nenhum usuário</td></tr>'}
window.toggleUsuario=async function(uid,ativo){if(!confirm(`${ativo?'Bloquear':'Ativar'}?`))return;await db.collection('gestao_usuarios').doc(uid).update({ativo:!ativo});setupUsuarios();showToast('Atualizado!','success')}

// ========== MODAL COM DETECÇÃO DE DDD ==========
window.openModal=function(id=null){
    editandoId=id;
    let d={data:new Date().toISOString().split('T')[0],nome:'',email:'',telefone:'',cpf:'',cnpj:'',marca:'',vendedora:'',estado:'',valorTotal:'',valorEntrada:'',status:'pending'};
    if(id){const c=clientes.find(x=>x.id===id);if(c)d=c}
    const modal=document.createElement('div');modal.className='modal-overlay show';
    modal.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h3>${id?'Editar':'Novo'} Cliente</h3><button class="btn-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div><form onsubmit="salvarCliente(event,'${id||''}')"><div class="modal-body"><div class="form-grid"><div class="form-group"><label class="form-label">CNPJ</label><input type="text" class="form-input" id="mfCNPJ" value="${d.cnpj||''}"></div><div class="form-group"><label class="form-label">CPF</label><input type="text" class="form-input" id="mfCPF" value="${d.cpf||''}"></div></div><div class="form-group"><label class="form-label">Nome do Cliente</label><input type="text" class="form-input" id="mfNome" value="${d.nome||''}" required></div><div class="form-grid"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="mfEmail" value="${d.email||''}" required></div><div class="form-group"><label class="form-label">Telefone (com DDD)</label><input type="tel" class="form-input" id="mfTelefone" value="${d.telefone||''}" required oninput="formatarTelefone(this);detectarEstadoPorDDD(this, document.getElementById('mfEstado'))"><div class="ddd-info" id="mfDddInfo"></div></div></div><div class="form-group"><label class="form-label">Marca / Patente</label><input type="text" class="form-input" id="mfMarca" value="${d.marca||''}" required></div><div class="form-grid form-grid-3"><div class="form-group"><label class="form-label">Vendedor(a)</label><input type="text" class="form-input" id="mfVendedora" value="${d.vendedora||''}" list="vlist" required><datalist id="vlist">${vendedoresList.map(v=>`<option value="${v}">`).join('')}</datalist></div><div class="form-group"><label class="form-label">Estado</label><select class="form-input" id="mfEstado"><option value="">Selecione...</option>${estadosValidos.map(e=>`<option value="${e}" ${d.estado===e?'selected':''}>${e}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="mfData" value="${d.data}" required></div></div><div class="form-grid"><div class="form-group"><label class="form-label">💰 Valor Total (R$)</label><input type="number" class="form-input" id="mfValorTotal" value="${d.valorTotal}" step="0.01" required></div><div class="form-group"><label class="form-label">💵 Entrada (R$)</label><input type="number" class="form-input" id="mfValorEntrada" value="${d.valorEntrada}" step="0.01" required></div></div><div class="form-group"><label class="form-label">Status</label><select class="form-input" id="mfStatus"><option value="pending" ${d.status==='pending'?'selected':''}>⏳ Pendente</option><option value="closed" ${d.status==='closed'?'selected':''}>✅ Fechado</option><option value="cancelado" ${d.status==='cancelado'?'selected':''}>❌ Cancelado</option></select></div></div><div class="modal-footer"><button type="button" class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button><button type="submit" class="btn btn-gold"><i class="fas fa-save"></i> Salvar</button></div></form></div>`;
    modal.addEventListener('click',function(e){if(e.target===this)this.remove()});
    document.body.appendChild(modal);
    
    setTimeout(() => {
        const telInput = document.getElementById('mfTelefone');
        const estadoSelect = document.getElementById('mfEstado');
        if (telInput && estadoSelect && telInput.value) {
            detectarEstadoPorDDD(telInput, estadoSelect);
        }
    }, 100);
};

window.salvarCliente=async function(e,id){e.preventDefault();const dados={data:document.getElementById('mfData').value,nome:document.getElementById('mfNome').value.trim(),email:document.getElementById('mfEmail').value.trim(),telefone:document.getElementById('mfTelefone').value.trim(),cpf:document.getElementById('mfCPF').value.trim(),cnpj:document.getElementById('mfCNPJ').value.trim(),marca:document.getElementById('mfMarca').value.trim(),vendedora:document.getElementById('mfVendedora').value.trim(),estado:document.getElementById('mfEstado').value,valorTotal:parseFloat(document.getElementById('mfValorTotal').value),valorEntrada:parseFloat(document.getElementById('mfValorEntrada').value),status:document.getElementById('mfStatus').value};if(!dados.nome||!dados.marca||isNaN(dados.valorTotal)){alert('Preencha todos os campos!');return}if(id){await db.collection('gestao_clientes').doc(id).update(dados)}else{await db.collection('gestao_clientes').add(dados)}document.querySelector('.modal-overlay')?.remove();showToast(id?'Atualizado!':'Criado!','success')}
window.deleteCliente=async function(id){const c=clientes.find(x=>x.id===id);if(c&&confirm(`Excluir ${c.nome}?`)){await db.collection('gestao_clientes').doc(id).delete();showToast('Excluído!','success')}}
window.fazerBackup=function(){const b={clientes:clientes.map(c=>({data:c.data,nome:c.nome,email:c.email,telefone:c.telefone,cpf:c.cpf,cnpj:c.cnpj,marca:c.marca,vendedora:c.vendedora,estado:c.estado,valorTotal:c.valorTotal,valorEntrada:c.valorEntrada,status:c.status})),vendedores:vendedoresList,exportadoEm:new Date().toISOString()};const bl=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`backup_kronos_${new Date().toISOString().split('T')[0]}.json`;a.click();showToast('Backup baixado!','success')}
window.restaurarBackup=function(){document.getElementById('restoreFileInput').click()}
window.handleRestoreFile=async function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async function(ev){try{const d=JSON.parse(ev.target.result);const cli=d.clientes||d.data||[];if(!Array.isArray(cli)||cli.length===0){alert('Arquivo inválido!');return}if(!confirm(`Importar ${cli.length} clientes?`))return;if(d.vendedores)await db.collection('gestao_config').doc('vendedores').set({lista:d.vendedores});let imp=0;for(const c of cli){try{await db.collection('gestao_clientes').add({data:c.data||'',nome:c.nome||'',email:c.email||'',telefone:c.telefone||'',cpf:c.cpf||'',cnpj:c.cnpj||'',marca:c.marca||'',vendedora:(c.vendedora||'').trim(),estado:c.estado||'',valorTotal:parseFloat(c.valorTotal)||0,valorEntrada:parseFloat(c.valorEntrada)||0,status:c.status||'pending'});imp++}catch(err){console.error(err)}}showToast(`${imp} importados!`,'success')}catch(err){alert('Erro: '+err.message)}};r.readAsText(f);e.target.value=''}
window.exportarExcel=function(){if(clientes.length===0){showToast('Sem dados!','error');return}let csv='\uFEFFData;Cliente;Email;CPF/CNPJ;Telefone;Marca;Vendedor;Estado;Valor;Entrada;Saldo;Status\n';clientes.sort((a,b)=>new Date(b.data)-new Date(a.data)).forEach(c=>{csv+=`${fmtDate(c.data)};${c.nome};${c.email||''};${c.cnpj||c.cpf||''};${c.telefone||''};${c.marca};${c.vendedora};${c.estado};R$ ${(parseFloat(c.valorTotal)||0).toFixed(2)};R$ ${(parseFloat(c.valorEntrada)||0).toFixed(2)};R$ ${((parseFloat(c.valorTotal)||0)-(parseFloat(c.valorEntrada)||0)).toFixed(2)};${c.status==='closed'?'Fechado':'Pendente'}\n`});const bl=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`excel_kronos_${new Date().toISOString().split('T')[0]}.csv`;a.click();showToast('Excel exportado!','success')}
function fmtDate(d){if(!d)return'-';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function badge(s){if(s==='closed')return'<span class="badge success">Fechado</span>';if(s==='cancelado')return'<span class="badge danger">Cancelado</span>';return'<span class="badge warning">Pendente</span>'}
function showToast(msg,type){const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
async function logout(){await auth.signOut();window.location.href='index.html'}
</script>
