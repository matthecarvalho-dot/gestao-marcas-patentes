<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronos System | Controle de Marcas</title>
    <link rel="shortcut icon" type="image/jpeg" href="https://i.imgur.com/NZyhksv.jpeg">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/NZyhksv.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/NZyhksv.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root{--bg:#030712;--primary:#4f46e5;--primary-light:#818cf8;--secondary:#7c3aed;--emerald:#10b981;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:rgba(255,255,255,0.06)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(79,70,229,0.1) 0%,transparent 100%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,0.05) 0%,transparent 100%);pointer-events:none;z-index:0}
        .container{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
        .card{background:rgba(17,24,39,0.7);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:40px 30px;text-align:center}
        .logo{width:80px;height:80px;background:transparent;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;overflow:hidden}
        .logo img{width:100%;height:100%;object-fit:contain;border-radius:16px}
        h2{font-size:22px;font-weight:700;margin-bottom:4px}
        h2 span{background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        p.sub{font-size:13px;color:var(--text3);margin-bottom:24px}
        .input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;font-family:inherit;margin-bottom:12px;transition:all 0.3s}
        .input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,0.15)}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:all 0.3s;background:linear-gradient(135deg,var(--primary),var(--secondary));box-shadow:0 4px 15px rgba(79,70,229,0.3)}
        .btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .link{font-size:12px;color:var(--text3);margin-top:16px;cursor:pointer}.link:hover{color:var(--primary-light)}.link span{color:var(--primary-light);font-weight:600}
        .msg{display:none;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px}
        .msg.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
        .msg.success{display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--emerald)}
        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:480px){.card{padding:30px 20px}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo"><img src="https://i.imgur.com/NZyhksv.jpeg" alt="Kronos System"></div>
        <h2>Kronos<span>System</span></h2>
        <p class="sub">Controle de Marcas</p>
        <div id="msg" class="msg"></div>
        
        <div id="formLogin">
            <input type="email" class="input" id="loginEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="input" id="loginSenha" placeholder="Sua senha" autocomplete="current-password">
            <button class="btn" onclick="login()" id="btnLogin"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div class="link">Não tem conta? <span onclick="showRegister()">Criar conta</span></div>
        </div>
        
        <div id="formRegister" style="display:none">
            <input type="text" class="input" id="regNome" placeholder="Seu nome completo">
            <input type="text" class="input" id="regWhatsapp" placeholder="Whatsapp (com DDD)">
            <input type="email" class="input" id="regEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="input" id="regSenha" placeholder="Crie uma senha (mín. 6 caracteres)" autocomplete="new-password">
            <button class="btn" onclick="register()" id="btnRegister"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <div class="link">Já tem conta? <span onclick="showLogin()">Fazer login</span></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC_IoFUQxa-a5EWDKdAUCeIcU6ngoel2ME",
    authDomain: "gestao-de-marcas.firebaseapp.com",
    projectId: "gestao-de-marcas",
    storageBucket: "gestao-de-marcas.firebasestorage.app",
    messagingSenderId: "893784316712",
    appId: "1:893784316712:web:4b625e1406b655ffca0e1d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => { if (user) window.location.href = 'gestao.html'; });

function showRegister(){document.getElementById('formLogin').style.display='none';document.getElementById('formRegister').style.display='block';hideMsg()}
function showLogin(){document.getElementById('formLogin').style.display='block';document.getElementById('formRegister').style.display='none';hideMsg()}
function hideMsg(){document.getElementById('msg').className='msg'}
function showMsg(t,c){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+c}

async function login(){
    const e=document.getElementById('loginEmail').value.trim(),s=document.getElementById('loginSenha').value;
    if(!e||!s)return showMsg('Preencha email e senha!','error');
    const b=document.getElementById('btnLogin');b.innerHTML='<span class="spinner"></span> Entrando...';b.disabled=true;
    try{
        const r=await auth.signInWithEmailAndPassword(e,s);
        const u=await db.collection('gestao_usuarios').doc(r.user.uid).get();
        if(u.exists&&u.data().ativo===false){await auth.signOut();showMsg('Conta desativada.','error');b.innerHTML='<i class="fas fa-sign-in-alt"></i> Entrar';b.disabled=false;return}
        window.location.href='gestao.html';
    }catch(e){let m='Erro ao fazer login.';if(e.code==='auth/user-not-found')m='Email não cadastrado.';else if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')m='Senha incorreta.';showMsg(m,'error')}
    b.innerHTML='<i class="fas fa-sign-in-alt"></i> Entrar';b.disabled=false;
}

async function register(){
    const n=document.getElementById('regNome').value.trim(),w=document.getElementById('regWhatsapp').value.trim();
    const e=document.getElementById('regEmail').value.trim(),s=document.getElementById('regSenha').value;
    if(!n||!e||!s)return showMsg('Preencha todos os campos!','error');
    if(s.length<6)return showMsg('Senha: mínimo 6 caracteres!','error');
    const b=document.getElementById('btnRegister');b.innerHTML='<span class="spinner"></span> Criando...';b.disabled=true;
    try{
        const r=await auth.createUserWithEmailAndPassword(e,s);
        await db.collection('gestao_usuarios').doc(r.user.uid).set({nome:n,email:e,whatsapp:w||'',ativo:true,role:'user',criadoEm:firebase.firestore.FieldValue.serverTimestamp(),ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()});
        showMsg('Conta criada!','success');setTimeout(()=>window.location.href='gestao.html',1000);
    }catch(e){let m='Erro.';if(e.code==='auth/email-already-in-use')m='Email já cadastrado.';showMsg(m,'error')}
    b.innerHTML='<i class="fas fa-user-plus"></i> Criar Conta';b.disabled=false;
}
</script>
</body>
</html>
